<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="styles.css">

<style>
.music-control{
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    padding: 12px 16px;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Waiting+for+the+Sunrise&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hubballi&family=Suravaram&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Mukta&display=swap" rel="stylesheet">
</head>

<body>

<script>
if(sessionStorage.getItem("gateUnlocked") !== "true"){
window.location.href = "gate.html";
}
</script>

<button id="musicControl" class="music-control">Pause.</button>

<div class="center-text" id="centerText">Charan Bhupathi.</div>

<nav class="navigation">
<a href="about.html" class="nav-link" data-page="about">About.</a>
<a href="projects.html" class="nav-link" data-page="projects">Projects.</a>
<a href="habits.html" class="nav-link" data-page="habits">Habits.</a>
<a href="other.html" class="nav-link" data-page="other">Other.</a>
</nav>

<div id="contentContainer" style="display:none"></div>

<audio id="backgroundMusic" loop preload="auto" autoplay>
<source src="music.mp3" type="audio/mpeg">
<source src="music.ogg" type="audio/ogg">
</audio>

<script>
// Restore background music state (clean version)
(function(){
const wasPlaying = sessionStorage.getItem('musicPlaying') === 'true';
const savedTime = parseFloat(sessionStorage.getItem('musicTime') || '0');

window.addEventListener('DOMContentLoaded', () => {
const music = document.getElementById('backgroundMusic');
if(!music) return;

music.volume = 0.3;

if(wasPlaying){
const restore = () => {
try{
if(savedTime > 0 && music.readyState >= 1){
music.currentTime = savedTime;
}
music.play().catch(()=>{});
}catch(e){}
};

if(music.readyState >= 2){
restore();
}else{
music.addEventListener('loadedmetadata', restore, {once:true});
}
}
});
})();
</script>

<script src="script.js"></script>

<script>
(function(){
const btn = document.getElementById('musicControl');
if(!btn) return;

let touchTriggered=false;

btn.addEventListener('touchend',function(e){
touchTriggered=true;
e.preventDefault();
btn.click();
setTimeout(()=>{touchTriggered=false;},400);
},{passive:false});

btn.addEventListener('click',function(e){
if(touchTriggered){
e.stopImmediatePropagation();
}
},true);
})();
</script>

</body>
</html>
