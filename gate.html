<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Waiting+for+the+Sunrise&display=swap" rel="stylesheet">

<style>
body{
    background:rgb(255, 255, 255);
    margin:0;
}

#securityGate{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:60%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:"Waiting for the Sunrise", cursive;
    font-size:0.9rem;
    font-weight:400;
    color:red;
    -webkit-text-stroke:0.3px red;
    text-shadow:0.3px 0.3px 0px red;
}

#securityGate input{
    background:transparent;
    border:none;
    outline:none;
    color:red;
    font-family:"Waiting for the Sunrise", cursive;
    font-size:0.9rem;
    font-weight:400;
    -webkit-text-stroke: 0.3px red;
    text-shadow: 0.3px 0.3px 0px red;
    width:1px;
    height:1px;
    caret-color: transparent;
    opacity:0.01;
    position:absolute;
}

#keyArea{
    display:flex;
    align-items:center;
}

#blinkUnderscore {
    animation: blinkUnderscore 1s infinite;
    margin-left: 4px;
}

@keyframes blinkUnderscore {
    0%{opacity:1}
    50%{opacity:0}
    100%{opacity:1}
}

#charCount{
    min-width:40px;
    text-align:right;
}
</style>

</head>

<body>

<div id="securityGate">

<div id="keyArea">
<span>KEY</span><span id="blinkUnderscore">_</span>
<input id="keyInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false" autofocus>
</div>

<div id="charCount">0</div>

</div>

<script>
const CORRECT_KEY = "RKVC512025";

const input = document.getElementById("keyInput");
let realValue = "";
const counter = document.getElementById("charCount");
const MAX_LENGTH = 10;
const blink = document.getElementById("blinkUnderscore");
const CHAR_SPACING = 10; // adjust pixel spacing per character

input.addEventListener('input', function(e){
    let val = input.value;
    if(val.length > MAX_LENGTH){
        val = val.slice(0, MAX_LENGTH);
    }
    realValue = val;
    input.value = realValue; // keep input in sync
    blink.style.marginLeft = `${4 + realValue.length * CHAR_SPACING}px`;
    counter.textContent = realValue.length;
});

// Handle Enter key for submit
input.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        if(realValue === CORRECT_KEY){
            sessionStorage.setItem('gateUnlocked','true');
            window.location.replace('index.html');
        } else {
            realValue = '';
            input.value = '';
            counter.textContent = 0;
            blink.style.marginLeft = `4px`;
        }
    }
});
</script>

</body>
</html>
